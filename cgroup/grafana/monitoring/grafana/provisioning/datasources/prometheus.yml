apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    # uid is pinned so the provisioned dashboard (which hardcodes
    # datasource uid "prometheus") resolves correctly. Without this Grafana
    # auto-generates a random uid and every panel shows "No Data".
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
