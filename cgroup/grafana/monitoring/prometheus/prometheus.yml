global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 30s

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: cgroup-exporter
    # Target reached via SSH reverse tunnel on the laptop:
    #   ssh -L 9753:127.0.0.1:9753 alice@<target>
    # `host.docker.internal` resolves to the laptop's host loopback when
    # docker-compose maps it via `extra_hosts`.
    static_configs:
      - targets: ["host.docker.internal:9753"]
        labels:
          instance: target-via-tunnel
